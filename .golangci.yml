version: "2"

linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    # Bug detection
    - bodyclose
    - durationcheck
    - errorlint
    - noctx
    - nosprintfhostport
    - sqlclosecheck
    # Style & consistency
    - gocritic
    - misspell
    - revive
    - unconvert
    - unparam
    - usestdlibvars
    - wastedassign
    - whitespace
    # Performance
    - prealloc
    - perfsprint
    # Prometheus-specific
    - promlinter
    # Security
    - gosec
    # Structured logging
    - sloglint

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
      disabled-checks:
        - hugeParam
        - unnamedResult
        - importShadow
        - octalLiteral
        - commentedOutCode
        - httpNoBody
    revive:
      rules:
        - name: blank-imports
        - name: exported
        - name: unreachable-code
        - name: unused-parameter
        - name: empty-block
        - name: superfluous-else
        - name: indent-error-flow
    perfsprint:
      err-error: true
      strconcat: false
    promlinter:
      strict: false

  exclusions:
    paths:
      - vendor
    rules:
      # Relax security and context linters in test files
      - path: _test\.go
        linters:
          - gosec
          - noctx
      # Don't require named params in test HTTP handlers
      - path: _test\.go
        linters:
          - revive
        text: "unused-parameter"
