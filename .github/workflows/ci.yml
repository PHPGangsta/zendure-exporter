name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go ${{ matrix.go-version }}
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            VERSION="dev"
          fi
          go build -v -ldflags="-X main.version=${VERSION}" ./cmd/zendure-exporter

      - name: Test
        run: go test -v -race ./...

      - name: Validate example config
        run: go run ./cmd/zendure-exporter --check-config --config config.example.yml

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          VERSION="${{ github.ref_name }}"
          if [[ "${{ github.ref_type }}" != "tag" ]]; then
            VERSION="dev"
          fi
          docker build --build-arg VERSION=${VERSION} -t zendure-exporter:ci .
