name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.23'

      - name: Build binaries
        run: |
          VERSION="${{ github.ref_name }}"
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          GOOS=linux   GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/zendure-exporter-linux-amd64   ./cmd/zendure-exporter
          GOOS=linux   GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/zendure-exporter-linux-arm64   ./cmd/zendure-exporter
          GOOS=linux   GOARCH=arm   go build -ldflags="${LDFLAGS}" -o dist/zendure-exporter-linux-armv7   ./cmd/zendure-exporter
          GOOS=darwin  GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/zendure-exporter-darwin-amd64  ./cmd/zendure-exporter
          GOOS=darwin  GOARCH=arm64 go build -ldflags="${LDFLAGS}" -o dist/zendure-exporter-darwin-arm64  ./cmd/zendure-exporter
          GOOS=windows GOARCH=amd64 go build -ldflags="${LDFLAGS}" -o dist/zendure-exporter-windows-amd64.exe ./cmd/zendure-exporter

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: dist/*

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Build and push multi-arch Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64,linux/arm/v7
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ github.ref_name }}
